<div class="container">
  <div class="nav">
    <h1>Kanban</h1>
    <div class="add-btn">
      <button (click)="triggerModal()">Add Task</button>
    </div>
  </div>
  <div class="wrapper-column" cdkDropListGroup>
    <app-column heading="Todo" status="todo" [tasks]="todo"></app-column>
    <app-column heading="Doing" status="doing" [tasks]="doing"></app-column>
    <app-column heading="Done" status="done" [tasks]="done"></app-column>
  </div>
  <app-modal></app-modal>
</div>
