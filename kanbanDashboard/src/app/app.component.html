<div class="container">
  <div class="nav">
    <h1>Kanban</h1>
    <div class="add-btn">
      <button (click)="triggerModal()">Add Task</button>
    </div>
  </div>
  <div class="wrapper-column">
    <app-column heading="Todo" [tasks]="filteredTask('todo')"></app-column>
    <app-column heading="Doing" [tasks]="filteredTask('doing')"></app-column>
    <app-column heading="Done" [tasks]="filteredTask('done')"></app-column>
  </div>
  <app-modal></app-modal>
</div>
