<div class="container" (click)="triggerModal()" *ngIf="isOpen">
    <div class="form-wrapper" (click)="$event.stopPropagation()">
        <h3>Task Info</h3>
        <form class="form" [formGroup]="taskForm" (ngSubmit)="onSubmit()">
            <div class="titletext">
                <label for="titleid">Title</label>
                <input type="text" id="titleid" formControlName="title">
                <span style="color: red;" *ngIf="taskForm.get('title')?.invalid || taskForm.get('title')?.touched || taskForm.get('title')?.hasError('minlength')">Title needed</span>
            </div>
            <div class="desctext">
                <label for="desc">Description</label>
                <input type="text" id="desc" formControlName="desc">
                <span style="color: red;" *ngIf="taskForm.get('desc')?.invalid && taskForm.get('desc')?.touched">Title needed</span>
            </div>
            <button type="submit">Add</button>
        </form>
    </div>
</div>
